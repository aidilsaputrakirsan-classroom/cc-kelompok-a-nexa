# ============================================================
# Docker Compose — Studyfy (Development)
# Komputasi Awan — SI ITK
# ============================================================
# Usage:
#   docker compose up -d          # Start semua services
#   docker compose down            # Stop & remove
#   docker compose logs -f         # Lihat logs
#   docker compose ps              # Status services
# ============================================================

services:
  # ==================== DATABASE ====================
  db:
    image: postgres:16-alpine
    container_name: studyfy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: studyfy
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - cloudnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d studyfy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==================== BACKEND ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: studyfy-backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Studyfy}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-True}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres123@db:5432/studyfy}
      SECRET_KEY: ${SECRET_KEY:-studyfy-super-secret-dev-key}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-True}
      CORS_ALLOW_METHODS: "*"
      CORS_ALLOW_HEADERS: "*"
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
    ports:
      - "8000:8000"
    networks:
      - cloudnet
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: studyfy-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - cloudnet
    depends_on:
      - backend

# ==================== VOLUMES ====================
volumes:
  pgdata:
    name: studyfy-pgdata

# ==================== NETWORKS ====================
networks:
  cloudnet:
    name: studyfy-network
    driver: bridge