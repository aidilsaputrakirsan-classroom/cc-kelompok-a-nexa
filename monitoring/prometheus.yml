global:
  scrape_interval: 5s # Ambil data setiap 5 detik sekali

scrape_configs:
  - job_name: 'auth-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['auth-service:8001']

  - job_name: 'item-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['item-service:8002']