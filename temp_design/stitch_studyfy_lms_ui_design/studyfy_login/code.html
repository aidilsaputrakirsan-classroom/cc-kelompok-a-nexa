<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Studyfy - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#b3b0bc",
                        "primary": "#4e4bd5",
                        "secondary-fixed": "#d3e4fe",
                        "secondary-dim": "#44546a",
                        "primary-container": "#7472fd",
                        "tertiary-container": "#fcd2fe",
                        "on-secondary-fixed": "#314055",
                        "surface-variant": "#e4e1ed",
                        "on-background": "#32313b",
                        "primary-fixed-dim": "#6765ef",
                        "on-primary": "#fbf7ff",
                        "inverse-primary": "#8382ff",
                        "on-tertiary-fixed": "#513355",
                        "tertiary": "#755478",
                        "error-container": "#f97386",
                        "tertiary-fixed-dim": "#eec4ef",
                        "surface-container": "#f0ecf6",
                        "on-primary-fixed-variant": "#020027",
                        "error": "#a8364b",
                        "surface-dim": "#dbd8e4",
                        "on-primary-container": "#000000",
                        "error-dim": "#6b0221",
                        "on-secondary-fixed-variant": "#4d5d73",
                        "on-surface": "#32313b",
                        "secondary-fixed-dim": "#c5d6f0",
                        "surface-tint": "#4e4bd5",
                        "secondary-container": "#d3e4fe",
                        "on-secondary": "#f7f9ff",
                        "surface-container-low": "#f6f2fa",
                        "surface-container-highest": "#e4e1ed",
                        "inverse-surface": "#0e0e12",
                        "tertiary-fixed": "#fcd2fe",
                        "inverse-on-surface": "#9e9ca2",
                        "on-tertiary": "#fff7fa",
                        "primary-fixed": "#7472fd",
                        "on-tertiary-fixed-variant": "#6f4e73",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#fff7f7",
                        "surface-bright": "#fcf8fe",
                        "surface": "#fcf8fe",
                        "outline": "#7b7984",
                        "tertiary-dim": "#68486c",
                        "on-tertiary-container": "#654569",
                        "on-primary-fixed": "#000000",
                        "background": "#fcf8fe",
                        "primary-dim": "#413dc9",

                        "secondary": "#506076",
                        "surface-container-high": "#eae6f1",
                        "on-error-container": "#6e0523",
                        "on-surface-variant": "#5f5e68"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"

                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]

                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-elevation {
            box-shadow: 0px 12px 32px rgba(78, 75, 213, 0.06);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #4e4bd5 0%, #7472fd 100%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Auth Shell suppressed Navigation per rules -->
<main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
<!-- Background Fluid Shapes -->
<div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-tertiary-container/20 rounded-full blur-[100px] -z-10"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[300px] h-[300px] bg-primary-container/10 rounded-full blur-[80px] -z-10"></div>
<div class="w-full max-w-[440px] z-10">
<!-- Brand Logo Center -->
<div class="flex flex-col items-center mb-8">
<div class="w-14 h-14 primary-gradient rounded-xl flex items-center justify-center mb-4 tonal-elevation">
<span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<h1 class="text-3xl font-extrabold text-on-background tracking-tight">Studyfy</h1>
<p class="text-on-surface-variant font-medium mt-1">The Fluid Academy</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-[2rem] p-8 md:p-10 tonal-elevation border border-outline-variant/10">
<div class="mb-8">
<h2 class="text-2xl font-bold text-on-background mb-2">Welcome Back</h2>
<p class="text-on-surface-variant text-sm">Please enter your details to sign in to your workspace.</p>
</div>
<!-- Error Message UI (Conditional Mockup) -->
<div class="mb-6 flex items-center gap-3 bg-error-container/10 border border-error/20 p-4 rounded-xl">
<span class="material-symbols-outlined text-error text-xl">error</span>
<p class="text-error text-sm font-medium">Invalid email or password. Please try again.</p>
</div>
<form class="space-y-5">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-sm font-semibold text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border border-outline-variant/20 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-outline/60 text-on-surface" id="email" placeholder="student@studyfy.edu" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:text-primary-dim transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low border border-outline-variant/20 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-outline/60 text-on-surface" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Login Button (Loading State Shown) -->
<button class="w-full primary-gradient text-on-primary font-bold py-4 rounded-xl tonal-elevation hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span class="material-symbols-outlined animate-spin text-xl group-active:hidden" style="display:none;">progress_activity</span>
<span>Sign In</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-outline-variant/20"></div></div>
<div class="relative flex justify-center text-xs font-semibold uppercase tracking-widest text-on-surface-variant/60">
<span class="bg-surface-container-lowest px-4">Or continue with</span>
</div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-1 gap-4">
<button class="flex items-center justify-center gap-3 w-full py-3.5 px-4 bg-surface-container-lowest border border-outline-variant/30 rounded-xl hover:bg-surface-container-high transition-colors font-semibold text-on-surface">
<img alt="Google" class="w-5 h-5" data-alt="Official Google G logo in its signature four-color palette on a transparent background for authentication button" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBD39-LAtEWJcmIZkxTXygHyAHnJ3217TTlB2LVWHo8LevaW1--SUb6ZS2-YAzDzv_scWKZbILwSUzWNgZf6yfAXu4fXCnxYqHLtUOTPYg3tHpoXGpse0gztdp3RhK7CBVc7n0RxftXDEQFjks8sq1YiupIXwS_T-PB93utw7oMBBQRez8B-4qJJwYJl7gm_hqsKkskFjGrz3PVXmKV0JV-jZpl79MmN6nXsGJKob1RBeyZO-g_OiSh9mIwR52GLzDSVdnVkITV4iI"/>
                        Google
                    </button>
</div>
</div>
<!-- Footer Toggle -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant font-medium">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 decoration-2 transition-all" href="#">Register for free</a>
</p>
</div>
</div>
</main>
<!-- Illustrative Texture/Image for the layout context -->
<div class="hidden lg:block fixed top-0 right-0 w-1/3 h-full -z-20">
<div class="w-full h-full opacity-20 bg-gradient-to-br from-primary/30 to-tertiary/20"></div>
<img class="absolute inset-0 w-full h-full object-cover mix-blend-overlay grayscale opacity-40" data-alt="Modern minimalist university architecture with glass walls and soft natural sunlight filtering through architectural lines" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDcwdT7gfTdqDxahNThpDQvQKd6ee1otlakrg8bXMLvA7Z9pHDeivGa1BdUehUDK2zlGL2yzxAnEG926VIK1j1eXa3OeiqeABs9_VM74rMsYDk4bdEimE7SWH0_2dHysRnQIh1OmLTM3pnQhMK-bUTmw0cSgb-g4auMrIcVdlN33h4s6_vpmFJTeW6D3VfouuqtZFLpSb_WZi-1fm6LxhIAEl9EA-RPgFPQQTTXiPUKnqyOFNHWuXUQ8Vv6Olw8krS9Xb2IIvj2ghY"/>
</div>
</body></html>
