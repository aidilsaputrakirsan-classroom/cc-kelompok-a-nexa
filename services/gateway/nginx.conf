upstream auth_service {
    server auth-service:8001;
}

upstream item_service {
    server item-service:8002;
}

upstream class_service {
    server class-service:8003;
}

upstream assignment_service {
    server assignment-service:8004;
}

server {
    listen 80;
    server_name localhost;

    # Auth Service routes
    location /auth/ {
        proxy_pass http://auth_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # User Profile / Listing users -> Auth Service
    location /users {
        # Check if it is the classes path and route to class_service instead
        rewrite ^/users/([^/]+)/classes$ /users/$1/classes break;
        proxy_pass http://auth_service;
        
        # In case rewrite did not match, fallback path
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Specific override for user classes route -> Class Service
    location ~ ^/users/(?<user_id>[^/]+)/classes$ {
        proxy_pass http://class_service/users/$user_id/classes;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Item Service routes
    location /items {
        proxy_pass http://item_service/items;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Class Service routes
    location /classes {
        proxy_pass http://class_service/classes;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Assignment Service routes (submissions and grade endpoints)
    location /submissions {
        proxy_pass http://assignment_service/submissions;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Team Info -> Item Service
    location /team {
        proxy_pass http://item_service/team;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Health check aggregator
    location /health {
        default_type application/json;
        return 200 '{"status": "healthy", "service": "gateway"}';
    }

    # Frontend (static files)
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}